<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<head>
	<title>amis编辑页</title>
	<link th:href="@{/lib/layui/css/layui.css}" rel="stylesheet">
</head>

<body style="height:100vh">
	<iframe id="magic_iframe" class="RuoYi_iframe" width="100%" height="100%" frameborder="0"></iframe>
	<script th:src="@{/lib/jquery/jquery-3.7.1.min.js}"></script>
	<script th:src="@{/lib/layui/layui.js}"></script>
	<script th:inline="javascript">
		var ctx = [[@{/}]];
		
		var prefix = ctx + "amis";
		
		var mpage = [[${amisPage}]]||{};
		
		delete mpage.createTime;
		
		layui.use(function(){
			
			function submitHandler(data,fun) {
				
				mpage.pageContent = JSON.stringify(data.schema);
				
				$.post(prefix + "/save",mpage,res=>{
					
					if(fun){
						res.code = [200][res.code]||res.code;
						fun(res);
					}
				});
				
			}
			
			let schema = JSON.parse(mpage.pageContent||`{
	    "type": "page",
	    "title": "Hello world",
	    "body": [
	        {
	            "type": "tpl",
	            "tpl": "初始页面",
	            "wrapperComponent": "",
	            "inline": false,
	            "id": "u:51870a11109e"
	        }
	    ],
	    "id": "u:ed84dc160476",
	    "asideResizor": false,
	    "pullRefresh": {
	        "disabled": true
	    }
	}`);
	
	if(schema.data == null){
		schema.data = {};
	}
	
	schema.data._mctx = ctx.substr(1);
			
			localStorage.setItem('store', JSON.stringify({"schema": schema}));
			
			var mifarme = $("#magic_iframe");
			 mifarme[0].onload=()=>{
				
				var mwindow = mifarme[0].contentWindow;
				mwindow._mctx = ctx.substr(1)==""?ctx.substr(1):ctx.substr(1)+"/";
				console.log("加载完成");
				
				
				mwindow._mPageSave = (data,fn) => {
					submitHandler(data,fn);
				};
				
				mwindow._mPageExit = () => {
					var closed = false;
					try { window.close(); closed = window.closed; } catch(e) {}
					// window.close() 仅对 JS 打开的窗口有效，无法关闭时显示提示
					if (!closed) {
						mwindow.document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:#666;">已退出编辑器，请关闭此页面</div>';
					}
				};
				
			};
			
			mifarme.attr("src",ctx + "amis/demo/index.html#/edit/0");
		
		});
	</script>
</body>

</html>
